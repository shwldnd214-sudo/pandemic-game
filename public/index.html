<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팬데믹 방역 작전 통제소</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #game-container { display: flex; width: 100%; height: 100%; }
        
        /* 🔥 좌측 보드판 영역 스크롤 및 크기 대폭 확장 */
        #map-wrapper { flex: 1; overflow: auto; padding: 20px; background-color: #0f172a; }
        #board { position: relative; width: 1400px; height: 900px; background-color: #1e293b; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #334155; margin: auto; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        
        .city-node { position: absolute; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10; transform: translate(-50%, -50%); transition: transform 0.2s; }
        .city-node:hover { transform: translate(-50%, -50%) scale(1.2); }
        .city-label { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; text-shadow: 2px 2px 4px #000; white-space: nowrap; }
        .cube-indicator { position: absolute; width: 22px; height: 22px; border-radius: 4px; color: white; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 1px 1px 3px rgba(0,0,0,0.8); z-index: 15; }
        .city-occupants { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
        .player-pawn { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; box-shadow: 1px 1px 2px rgba(0,0,0,0.5); border: 1px solid white; }
        
        /* 우측 컨트롤 패널 */
        #ui-panel { width: 350px; min-width: 350px; background-color: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; height: 100%; overflow-y: auto; }
        .panel-section { background-color: #0f172a; border-radius: 8px; padding: 15px; margin: 10px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; font-size: 14px; }
        .btn:hover { filter: brightness(1.1); }
        
        /* 모달창 */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; justify-content:center; align-items:center; }
        .modal-content { background:#1e293b; padding:30px; border-radius:10px; max-width:600px; text-align:center; border: 1px solid #334155; }
        .role-btn { display:inline-block; width:180px; padding:15px; margin:10px; background:#0f172a; border:2px solid; border-radius:8px; cursor:pointer; text-align:left; }
        
        #action-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 20px; border-radius: 10px; border: 2px solid #475569; z-index: 50; display: none; min-width: 280px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn-action { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer; text-align: left; font-size: 14px; }
        .btn-action:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="map-wrapper">
            <div id="board">
                <canvas id="map-canvas" width="1400" height="900"></canvas>
            </div>
        </div>
        
        <div id="ui-panel">
            <div class="panel-section">
                <h2 style="margin-top:0; color:#fbbf24; font-size:18px;">☣️ 팬데믹 관제소</h2>
                <div style="font-size:14px; line-height:1.6;">
                    <div>내 보직: <strong id="txt-role">-</strong></div>
                    <div>행동력: <strong id="txt-actions">0</strong> / 4</div>
                    <div>확산 지수: <strong id="txt-outbreak" style="color:#ef4444;">0</strong> / 8</div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; text-align:center; font-size:12px; font-weight:bold;">
                    <div id="v-blue" style="flex:1; background:#3498db; color:white; padding:5px; margin:2px; border-radius:4px; opacity:0.3;">파랑</div>
                    <div id="v-yellow" style="flex:1; background:#f1c40f; color:black; padding:5px; margin:2px; border-radius:4px; opacity:0.3;">노랑</div>
                    <div id="v-gray" style="flex:1; background:#7f8c8d; color:white; padding:5px; margin:2px; border-radius:4px; opacity:0.3;">회색</div>
                    <div id="v-red" style="flex:1; background:#e74c3c; color:white; padding:5px; margin:2px; border-radius:4px; opacity:0.3;">빨강</div>
                </div>
                <div id="turn-alert" style="margin-top:10px; font-weight:bold; color:#fbbf24; text-align:center; padding:8px; background:rgba(251,191,36,0.1); border-radius:4px;">대기 중...</div>
            </div>

            <div class="panel-section" style="padding:10px;">
                <button class="btn" style="background:#ef4444;" onclick="treat()">💊 질병 치료</button>
                <button class="btn" style="background:#3b82f6;" onclick="build()">🏢 연구소 건설</button>
                <button class="btn" style="background:#10b981;" onclick="cure()">🧪 백신 연구</button>
                <button class="btn" style="background:#8b5cf6;" onclick="share()">🤝 지식 공유</button>
                <button class="btn" style="background:#f59e0b; color:black;" onclick="openGuideModal()">📘 직업 및 이벤트 가이드 북</button>
                <button class="btn" style="background:#7f1d1d; margin-top:10px;" onclick="if(confirm('진짜 재시작할까요?')) socket.emit('resetGame')">🔄 게임 리셋</button>
            </div>

            <div id="card-section" class="panel-section" style="flex:1; overflow-y:auto;">
                </div>
            
            <div class="panel-section" style="height:150px; overflow-y:auto; font-size:12px; color:#94a3b8;">
                <h3 style="margin-top:0; color:white; font-size:14px;">📄 실시간 로그</h3>
                <div id="log-area"></div>
            </div>
        </div>
    </div>

    <div id="role-overlay" class="overlay">
        <div class="modal-content">
            <h2 style="color:#fbbf24; margin-top:0;">방역 요원 보직 선택</h2>
            <div id="role-container" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        </div>
    </div>

    <div id="action-modal">
        <h3 id="modal-city-name" style="margin-top:0; margin-bottom:15px; text-align:center; color:white;">도시</h3>
        <button class="btn-action" onclick="sendAction('move_drive')">🚗 차량/연락선 이동</button>
        <button class="btn-action" onclick="sendAction('move_direct')">✈️ 직항 비행 (해당 도시 카드 소모)</button>
        <button class="btn-action" onclick="sendAction('move_charter')">🗺️ 전역 노선 (현재 도시 카드 소모)</button>
        <button class="btn-action" onclick="sendAction('move_shuttle')">🚀 셔틀 비행 (연구소 ↔ 연구소)</button>
        <button id="btn-dispatcher-gather" class="btn-action" style="background:#b45309; display:none;" onclick="sendAction('move_gather')">✈️ 요원 합류 (운항관리자 전용)</button>
        <button class="btn-action" style="background:#ef4444; text-align:center;" onclick="closeModal()">취소</button>
    </div>

    <div id="guide-modal" class="overlay" style="display:none;">
        <div class="modal-content" style="text-align:left;">
            <h2 style="color:#fbbf24; margin-top:0;">📘 가이드 북</h2>
            <h3 style="color:#60a5fa;">👤 직업 능력</h3>
            <div id="guide-roles" style="font-size:14px; margin-bottom:20px;"></div>
            <h3 style="color:#c084fc;">🃏 이벤트 카드</h3>
            <div id="guide-events" style="font-size:14px;"></div>
            <div style="text-align:center; margin-top:20px;">
                <button class="btn" style="background:#475569; width:auto; padding:10px 30px;" onclick="document.getElementById('guide-modal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
