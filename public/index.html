<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팬데믹 방역 작전 통제소</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #game-container { display: flex; width: 100%; height: 100%; position: relative; }
        
        #map-wrapper { flex: 1; overflow: auto; padding: 10px; background-color: #0f172a; display: flex; align-items: center; justify-content: center; position: relative; }
        #board { position: relative; width: 1280px; height: 720px; background-color: #1e293b; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid #334155; }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        
        #danger-zones-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fca5a5; padding: 8px 20px; border-radius: 20px; border: 1px solid #ef4444; font-size: 14px; font-weight: bold; z-index: 20; display: none; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        
        .city-node { position: absolute; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 8px rgba(0,0,0,0.6); z-index: 10; transform: translate(-50%, -50%); transition: transform 0.2s; }
        .city-node:hover { transform: translate(-50%, -50%) scale(1.2); }
        .city-label { position: absolute; top: -23px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: bold; text-shadow: 2px 2px 4px #000; white-space: nowrap; }
        .cube-indicator { position: absolute; width: 20px; height: 20px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; box-shadow: 1px 1px 3px rgba(0,0,0,0.8); z-index: 15; }
        
        .city-occupants { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
        .player-pawn { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: white; box-shadow: 1px 1px 5px rgba(0,0,0,0.8); border: 2px solid white; text-shadow: 1px 1px 2px black; }
        
        #ui-panel { width: 320px; min-width: 320px; background-color: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; height: 100%; overflow-y: auto; z-index:30; }
        .panel-section { background-color: #0f172a; border-radius: 8px; padding: 12px; margin: 8px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 10px; margin-bottom: 6px; border: none; border-radius: 6px; font-weight: bold; color: white; cursor: pointer; font-size: 13px; }
        .btn:hover { filter: brightness(1.1); }
        
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; display:flex; justify-content:center; align-items:center; }
        .modal-content { background:#1e293b; padding:25px; border-radius:10px; max-width:550px; text-align:center; border: 1px solid #334155; }
        .role-btn { display:inline-block; width:170px; padding:12px; margin:8px; background:#0f172a; border:2px solid; border-radius:8px; cursor:pointer; text-align:left; }
        
        #action-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 20px; border-radius: 10px; border: 2px solid #475569; z-index: 50; display: none; min-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .btn-action { display: block; width: 100%; padding: 11px; margin-bottom: 7px; background: #334155; color: white; border: none; border-radius: 5px; cursor: pointer; text-align: left; font-size: 13px; }
        .btn-action:hover { background: #475569; }
        
        @keyframes slideDown { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        #alert-layer { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <div id="alert-layer"></div>

    <div id="game-container">
        <div id="map-wrapper">
            <div id="danger-zones-bar"></div>
            <div id="board">
                <canvas id="map-canvas" width="1280" height="720"></canvas>
            </div>
        </div>
        
        <div id="ui-panel">
            <div class="panel-section">
                <h2 style="margin-top:0; color:#fbbf24; font-size:16px; margin-bottom:10px;">☣️ 팬데믹 관제소</h2>
                <div style="font-size:13px; line-height:1.5;">
                    <div>보직: <strong id="txt-role">-</strong></div>
                    <div>행동력: <strong id="txt-actions">0</strong> / 4</div>
                    <div>확산 지수: <strong id="txt-outbreak" style="color:#ef4444;">0</strong> / 8</div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px; text-align:center; font-size:11px; font-weight:bold;">
                    <div id="v-blue" style="flex:1; background:#3498db; color:white; padding:4px; margin:1px; border-radius:4px; opacity:0.3;">파랑</div>
                    <div id="v-yellow" style="flex:1; background:#f1c40f; color:black; padding:4px; margin:1px; border-radius:4px; opacity:0.3;">노랑</div>
                    <div id="v-gray" style="flex:1; background:#7f8c8d; color:white; padding:4px; margin:1px; border-radius:4px; opacity:0.3;">회색</div>
                    <div id="v-red" style="flex:1; background:#e74c3c; color:white; padding:4px; margin:1px; border-radius:4px; opacity:0.3;">빨강</div>
                </div>
                <div id="turn-alert" style="margin-top:8px; font-weight:bold; color:#fbbf24; text-align:center; padding:6px; background:rgba(251,191,36,0.1); border-radius:4px; font-size:12px;">대기 중...</div>
            </div>

            <div class="panel-section" style="padding:8px;">
                <button class="btn" style="background:#ef4444;" onclick="treat()">💊 질병 치료</button>
                <button class="btn" style="background:#3b82f6;" onclick="build()">🏢 연구소 건설</button>
                <button class="btn" style="background:#10b981;" onclick="cure()">🧪 백신 연구</button>
                <button class="btn" style="background:#8b5cf6;" onclick="share()">🤝 지식 공유</button>
                <button class="btn" style="background:#475569; margin-top:5px; border: 1px solid #64748b;" onclick="if(confirm('남은 행동력을 모두 포기하고 턴을 종료하시겠습니까?')) socket.emit('playerAction', {type:'pass_turn'})">⏭️ 턴 강제 종료</button>
                <button class="btn" style="background:#f59e0b; color:black; margin-top:10px;" onclick="openGuideModal()">📘 능력/이벤트 가이드북</button>
                <button class="btn" style="background:#7f1d1d; margin-top:5px;" onclick="if(confirm('진짜 방역 시뮬레이션을 리셋할까요?')) socket.emit('resetGame')">🔄 게임 리셋</button>
            </div>

            <div id="card-section" class="panel-section" style="flex:1; overflow-y:auto;"></div>
            
            <div class="panel-section" style="height:140px; overflow-y:auto; font-size:11px; color:#94a3b8;">
                <h3 style="margin-top:0; color:white; font-size:13px; margin-bottom:5px;">📄 통제소 로그</h3>
                <div id="log-area"></div>
            </div>
        </div>
    </div>

    <div id="role-overlay" class="overlay">
        <div class="modal-content">
            <h2 style="color:#fbbf24; margin-top:0; font-size:20px;">방역 요원 보직 선택</h2>
            <div id="role-container" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        </div>
    </div>

    <div id="action-modal">
        <h3 id="modal-city-name" style="margin-top:0; margin-bottom:12px; text-align:center; color:white; font-size:15px;">도시 명령어</h3>
        
        <div id="mover-selection-zone" style="margin-bottom:12px; background:#0f172a; padding:8px; border-radius:6px; border:1px solid #334155; display:none;">
            <label style="font-size:11px; color:#94a3b8; display:block; margin-bottom:4px;">🎯 타 요원 대리 이동 (운항관리자):</label>
            <select id="select-mover-target" style="width:100%; background:#1e293b; color:white; border:1px solid #475569; padding:6px; border-radius:4px; font-weight:bold; font-size:12px;"></select>
        </div>

        <button class="btn-action" onclick="sendAction('move_drive')">🚗 차량/연락선 이동</button>
        <button class="btn-action" onclick="sendAction('move_direct')">✈️ 직항 비행 (해당 도시 카드 소모)</button>
        <button class="btn-action" onclick="sendAction('move_charter')">🗺️ 전역 노선 (현재 도시 카드 소모)</button>
        <button class="btn-action" onclick="sendAction('move_shuttle')">🚀 셔틀 비행 (연구소 ↔ 연구소)</button>
        
        <button id="btn-dispatcher-gather-me" class="btn-action" style="background:#b45309; display:none;" onclick="sendGatherMe()">✈️ 내 말을 동료 위치로 워프 (운항관리자)</button>
        <button id="btn-dispatcher-gather-colleague" class="btn-action" style="background:#b45309; display:none;" onclick="sendGatherColleague()">✈️ 동료를 내 위치로 호출 (운항관리자)</button>
        
        <button id="btn-ops-expert" class="btn-action" style="background:#a855f7; display:none;" onclick="sendOpsExpertMove()">✈️ 기지 특수 비행 (아무 카드나 1장 버리기)</button>

        <button class="btn-action" style="background:#ef4444; text-align:center; margin-top:5px;" onclick="closeModal()">취소</button>
    </div>

    <div id="guide-modal" class="overlay" style="display:none;">
        <div class="modal-content" style="text-align:left;">
            <h2 style="color:#fbbf24; margin-top:0; font-size:18px;">📘 요원 가이드 북</h2>
            <h3 style="color:#60a5fa; font-size:14px; margin-bottom:5px;">👤 직업 고유 능력</h3>
            <div id="guide-roles" style="font-size:12px; margin-bottom:15px; line-height:1.4;"></div>
            <h3 style="color:#c084fc; font-size:14px; margin-bottom:5px;">🃏 보조 이벤트 카드</h3>
            <div id="guide-events" style="font-size:12px; line-height:1.4;"></div>
            <div style="text-align:center; margin-top:15px;">
                <button class="btn" style="background:#475569; width:auto; padding:8px 24px;" onclick="document.getElementById('guide-modal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
</body>
</html>
